name: CI/CD to EC2

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Log in to DockerHub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build and push Server Image
      uses: docker/build-push-action@v4
      with:
        context: ./server
        push: true
        tags: ${{ secrets.DOCKER_USERNAME }}/ec2-test-node-server:latest

    - name: Build and push Client Image
      uses: docker/build-push-action@v4
      with:
        context: ./client
        push: true
        tags: ${{ secrets.DOCKER_USERNAME }}/ec2-test-node-client:latest

    - name: Deploy to EC2
      uses: appleboy/ssh-action@v0.1.10
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USERNAME }}
        key: ${{ secrets.EC2_PRIVATE_KEY }}
        script: |
          docker pull ${{ secrets.DOCKER_USERNAME }}/ec2-test-node-server:latest
          docker pull ${{ secrets.DOCKER_USERNAME }}/ec2-test-node-client:latest
          
          docker stop app-server || true
          docker rm app-server || true
          docker stop app-client || true
          docker rm app-client || true
          
          docker run -d --restart unless-stopped -p 3000:3000 --name app-server ${{ secrets.DOCKER_USERNAME }}/ec2-test-node-server:latest
          docker run -d --restart unless-stopped -p 80:80 --name app-client ${{ secrets.DOCKER_USERNAME }}/ec2-test-node-client:latest
